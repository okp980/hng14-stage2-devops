name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      - name: Install Flake8
        run: pip install flake8
      - name: Lint API with Flake8
        working-directory: ./api
        run: flake8 .
      - name: Lint Worker with Flake8
        working-directory: ./worker
        run: flake8 .
      - name: ESLint
        uses: stefanoeb/eslint-action@1.0.2
        with:
          files: frontend/
