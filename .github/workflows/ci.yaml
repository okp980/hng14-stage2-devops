name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      - name: Install Flake8
        run: pip install flake8
      - name: Lint API with Flake8
        working-directory: ./api
        run: flake8 .
      - name: Lint Worker with Flake8
        working-directory: ./worker
        run: flake8 .
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Lint Frontend with ESLint
        working-directory: ./frontend
        run: npx eslint .
      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./api/Dockerfile
      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./frontend/Dockerfile
      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./worker/Dockerfile

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      - name: Install dependencies
        working-directory: ./api
        run: pip install -r requirements.txt
      - name: Run API tests
        working-directory: ./api
        run: pytest . --cov=api --cov-report=html:htmlcov
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./api/htmlcov

  integration:
    name: Integration test
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create Compose env
        run: |
          cat > .env << 'EOF'
          REDIS_HOST=redis
          REDIS_PORT=6379
          API_URL=http://api:8000
          PORT=3000
          EOF
      - name: Full stack — submit job via frontend, poll to completed, tear down
        run: bash scripts/integration-e2e.sh
      - name: Ensure Compose teardown
        if: always()
        run: docker compose -f compose.yaml down -v --remove-orphans || true

  build:
    needs: test
    runs-on: ubuntu-latest

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

  trivy:
    name: Trivy — CRITICAL + SARIF
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          curl -sfL "https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh" | sh -s -- -b /usr/local/bin "v0.58.0"
      # A new job cannot use the build job's localhost:5000 registry. Rebuild the
      # same Dockerfiles/contexts, then scan those images.
      - name: Build images for Trivy
        run: |
          docker build -t trivy-scan/api:ci ./api
          docker build -t trivy-scan/frontend:ci ./frontend
          docker build -t trivy-scan/worker:ci ./worker
      - name: Trivy scan all images (fail on CRITICAL)
        run: |
          set +e
          FAIL=0
          for name in api frontend worker; do
            echo "=== Scanning trivy-scan/${name}:ci ==="
            trivy image --severity CRITICAL --exit-code 1 \
              --format sarif --output "trivy-${name}.sarif" \
              "trivy-scan/${name}:ci"
            R=$?
            if [ "$R" -ne 0 ]; then
              echo "Trivy reported CRITICAL (or other exit ${R}) for ${name}"
              FAIL=1
            fi
          done
          exit $FAIL
      - name: Upload Trivy SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-*.sarif
          if-no-files-found: ignore
